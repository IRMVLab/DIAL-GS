exhaust_test: false
isotropic: false
enable_dynamic: true

scale_increase_interval: 5000
# ModelParams
scene_type: "Waymo"
resolution_scales: [2]
cam_num: 1
eval: false
num_pts: 1000
random_init_point: 1000 # Additional GS points randomly initialized beyond LiDAR measurements
t_init: 0.1
time_duration: [0, 1]
separate_scaling_t: 0.2
separate_velocity: 10
start_time: 0
end_time: 49
stride: 0
original_start_time: 0

load_sky_mask: false
load_panoptic_mask: false
load_sam_mask: false
load_dynamic_mask: true
load_feat_map: false
load_normal_map: false

load_intrinsic: false
load_c2w: false

save_occ_grid: true
occ_voxel_size: 0.4
recompute_occ_grid: false
use_bg_gs: false
white_background: false
# PipelineParams


# OptimizationParams
iterations: 60000
dynamic_mask_epoch: 10000 # Enables velocity and beta regularization after this iteration
id_mask_epoch: 10000 # Enables ID-specific training after this iteration


opacity_lr: 0.005

densify_until_iter: 15000
densify_grad_threshold: 0.00017
sh_increase_interval: 2000

lambda_self_supervision: 0

env_map_res: 1024
lambda_t_reg: 0.005
lambda_v_reg: 0.01
lambda_normal: 0.1
lambda_lidar: 0.1
lambda_scaling: 0.0
lambda_depth_var: 0.0
lambda_min_scale: 10.0
min_scale: 0.001
max_scale: 0.2 # corresponding to 4.0m
lambda_max_scale: 1.0

neg_fov: true

render_type: pvg



multi_view_weight_from_iter: 20000
multi_view_patch_size: 3
multi_view_sample_num: 102400
multi_view_ncc_weight: 0.0
multi_view_geo_weight: 0.03
multi_view_pixel_noise_th: 1.0


reg3d_k: 5 # 5
lambda_obj_3d: 1.5 # 1.5
lambda_obj_2d: 0.1 # 0.5 0.1
lambda_consistency: 0.01 #0.01

